schema: spec-driven

context: |
  ## Project
  UniHub Workshop — a university workshop registration and check-in system.
  Built for "Skills & Career Week": 5 days, 8–12 parallel workshops/day, ~12,000 students.

  ## Architecture
  Modular monolith. Modules: auth, workshop, registration, payment, checkin,
  notification, ai-summary, csv-import. All modules share one codebase and one
  database. Modules communicate via service calls and Bull queues — never direct
  cross-module DB access.

  ## Tech Stack
  - Backend: Node.js + Express.js (no NestJS), TypeScript (strict mode)
  - Frontend: Next.js 14 (App Router) + Tailwind CSS + TypeScript — deployed on Vercel free tier
  - Mobile: React Native + Expo (iOS & Android) + TypeScript — check-in staff only.
    Sole purpose: scan student QR codes, record check-ins offline, sync when back online.
    Students and organizers use the web app (frontend/) exclusively — no mobile features for them.
  - Database: PostgreSQL via Supabase (free tier, connection pool via Supabase pooler)
  - ORM/Query: node-postgres (pg) with raw SQL + typed query wrappers — no ORM
  - Cache & Queue backend: Redis via Upstash (free tier, REST-compatible)
  - Job queue: BullMQ backed by Upstash Redis
  - File storage: Cloudflare R2 (free tier, S3-compatible)
  - Email: Resend (free tier, 3,000 emails/month)
  - AI: Google Gemini API (free tier, 60 RPM)
  - Payments: VNPay (sandbox for development)
  - Auth: JWT (access token 15 min) + refresh token (7 days, stored in Upstash Redis)
  - Mobile local storage: expo-sqlite (SQLite) for offline check-in queue
  - Cron: node-cron for scheduled CSV import (runs at 02:05 AM daily)
  - Infra: single VPS (Oracle Cloud ARM free tier) + Docker Compose + Traefik (TLS)
  - CI/CD: GitHub Actions → Docker build → SSH deploy

  ## Key Infrastructure Notes
  - Supabase: use the connection pooler endpoint (port 6543, pgBouncer mode) for
    all app queries to stay within free-tier connection limits (max 60 direct conns).
    Use direct connection (port 5432) only for migrations.
  - Upstash Redis: HTTP/REST-based — use @upstash/redis client, not ioredis.
    BullMQ requires a special adapter: @upstash/redis + bullmq's IORedis-compatible
    shim. Rate limit counters and idempotency keys also stored here.
  - All secrets in environment variables, never hardcoded. Use .env.example as template.

  ## Key Technical Decisions
  - Seat allocation: Redis DECRBY as fast pre-check, then PostgreSQL atomic UPDATE
    (remaining_seats = remaining_seats - 1 WHERE remaining_seats > 0) as final commit.
  - Double-charge prevention: idempotency_key (UUID v4) stored in both Upstash Redis
    (TTL 24h, fast lookup) and PostgreSQL payments table (UNIQUE constraint, durable).
  - Circuit Breaker for VNPay: 3 states (CLOSED/OPEN/HALF-OPEN), state stored in
    Upstash Redis with TTL. Threshold: 5 failures in 30s → OPEN for 60s.
  - Rate limiting: Token Bucket per user, implemented with Upstash Redis Lua script
    (atomic). Capacity: 5 tokens, refill: 1/sec.
  - Offline check-in: JWT-signed QR codes (verifiable without network). Pending
    check-ins stored in SQLite, synced via POST /checkin/sync when back online.
    Server uses INSERT ... ON CONFLICT DO NOTHING for idempotency.
  - CSV import: staging table → validate → upsert to users → deactivate removed
    students. Aborts if error rate > 10%. Runs in chunks of 500 rows.
  - Notifications: async via BullMQ. Strategy pattern for channels (Email, InApp).
    Telegram channel planned but not implemented yet — adding it must not touch
    Registration or Workshop modules.
  - Payment hold: paid workshops create registration with status pending_payment +
    10-minute TTL. Background job releases seat if payment not completed in time.
  - QR token: signed JWT containing {registration_id, workshop_id, user_id},
    expires at workshop.ends_at + 1 hour.

  ## Project Structure
  Monorepo — three apps in one repository, no shared package workspace (keep it simple).
  Each app has its own package.json and is deployed independently.

