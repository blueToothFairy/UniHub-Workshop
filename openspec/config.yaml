  ## Constraints
  - TypeScript strict mode enabled across all three apps (backend, frontend, mobile).
    No implicit any. All function parameters and return types must be explicitly typed.
  - No NestJS — Express only, 3-week deadline.
  - No Kubernetes, no multi-region, no managed load balancer.
  - Supabase free tier: 500MB DB storage, 2GB bandwidth, 60 pooled connections.
  - Upstash free tier: 10,000 commands/day — design Redis usage to stay within this.
    Avoid chatty patterns; batch reads where possible.

  ## SOLID Principles — How They Apply Here
  - Single Responsibility: each module folder owns exactly one domain (e.g. registration/).
    A router file only wires HTTP → service. A service file only contains business logic.
    Workers only consume queue jobs — no business logic inside workers, they delegate to services.
  - Open/Closed: NotificationService resolves channels via a registry. Adding TelegramChannel
    means creating a new class that implements INotificationChannel — zero changes to
    NotificationService or any other module.
  - Liskov Substitution: all NotificationChannel implementations must honour the INotificationChannel
    contract (send() never throws for expected errors, always returns a result object).
  - Interface Segregation: define narrow interfaces per consumer. E.g. IWorkshopReader (read-only
    queries) vs IWorkshopWriter (mutations) — checkin module only depends on IWorkshopReader.
  - Dependency Inversion: services receive dependencies (db, redis, queue) via constructor
    injection, never import singletons directly. This makes unit testing possible without
    mocking module-level imports.

rules:
  proposal:
    - State the problem in one sentence before elaborating
    - Always include a "Out of Scope" section to prevent scope creep
    - Quantify success criteria where possible (e.g. "< 2s response time")
    - Flag any decision that increases monthly infrastructure cost

  design:
    - Include a sequence diagram for every flow that crosses more than two components
    - Every ADR must follow the format: Decision / Reason / Trade-off
    - Always specify which Supabase connection endpoint to use (pooler vs direct)
    - Always specify Upstash command count impact for new Redis usage patterns
    - Do not propose solutions that require a new paid service or new Docker container
    - When designing a queue job, explicitly state: trigger event, consumer, retry policy
    - For every new interface introduced, name which SOLID principle it satisfies and why

  specs:
    - Use Given/When/Then format for all acceptance criteria
    - Every error scenario must specify the HTTP status code and response body shape
    - Explicitly state whether the operation is idempotent and how
    - Call out any behaviour that differs between online and offline modes
    - Reference the relevant ADR if the spec depends on a key technical decision

  tasks:
    - Break tasks into chunks completable in under 2 hours
    - Each task must reference its parent spec or design section
    - Database migration tasks must always come before the service tasks that use them
    - Include a manual smoke-test step at the end of each feature group
    - TypeScript tasks must include defining types/interfaces before implementing the service
    - Flag any task where the implementation would violate SRP (doing more than one thing)
